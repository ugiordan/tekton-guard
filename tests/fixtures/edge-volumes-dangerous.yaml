apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: docker-socket-task
spec:
  volumes:
  - name: docker-sock
    hostPath:
      path: /var/run/docker.sock
  - name: safe-vol
    emptyDir: {}
  steps:
  - name: build
    image: docker.io/docker:24@sha256:abcdef1234567890abcdef1234567890abcdef1234567890abcdef1234567890
    volumeMounts:
    - name: docker-sock
      mountPath: /var/run/docker.sock
---
