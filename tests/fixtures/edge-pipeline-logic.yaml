apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: security-in-main-tasks
  labels:
    pipelines.appstudio.openshift.io/type: build
spec:
  tasks:
  - name: git-clone
    taskRef:
      resolver: git
      params:
      - name: url
        value: https://github.com/opendatahub-io/tasks.git
      - name: revision
        value: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
  - name: sast-scan
    runAfter: [git-clone]
    taskRef:
      resolver: git
      params:
      - name: url
        value: https://github.com/opendatahub-io/tasks.git
      - name: revision
        value: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
  - name: build
    runAfter: [git-clone]
    taskRef:
      resolver: git
      params:
      - name: url
        value: https://github.com/opendatahub-io/tasks.git
      - name: revision
        value: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
