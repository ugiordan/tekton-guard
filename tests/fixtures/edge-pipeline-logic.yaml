      - name: url
        value: https://github.com/opendatahub-io/tasks.git
      - name: revision
        value: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: no-finally-pipeline
spec:
  tasks:
  - name: build
    taskRef:
      resolver: git
      params:
      - name: url
        value: https://github.com/opendatahub-io/tasks.git
      - name: revision
        value: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: parallel-untrusted-workspace
spec:
  workspaces:
  - name: shared
  tasks:
  - name: clone
    workspaces:
    - name: output
      workspace: shared
    taskRef:
      resolver: git
      params:
      - name: url
        value: https://github.com/opendatahub-io/tasks.git
      - name: revision
        value: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
  - name: untrusted-scan
    workspaces:
    - name: source
      workspace: shared
    taskRef:
      resolver: hub
      params:
      - name: name
        value: external-scan
