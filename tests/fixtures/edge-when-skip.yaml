apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: pipeline-with-when-skip
spec:
  params:
  - name: skip-scan
    type: string
    default: "false"
  tasks:
  - name: sast-scan
    when:
    - input: $(params.skip-scan)
      operator: notin
      values: ["true"]
    taskRef:
      resolver: git
      params:
      - name: url
        value: https://github.com/opendatahub-io/tasks.git
      - name: revision
        value: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
  - name: build
    taskRef:
      resolver: git
      params:
      - name: url
        value: https://github.com/opendatahub-io/tasks.git
      - name: revision
        value: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
