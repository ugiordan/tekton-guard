apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: cel-injection-risk
  annotations:
    pipelinesascode.tekton.dev/on-cel-expression: |
      event == "pull_request" && body.pull_request.head.ref.startsWith("feature/")
spec:
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/opendatahub-io/pipelines.git
    - name: revision
      value: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
  taskRunTemplate:
    serviceAccountName: test-sa
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: permissive-push
  annotations:
    pipelinesascode.tekton.dev/on-cel-expression: event == "push"
spec:
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/opendatahub-io/pipelines.git
    - name: revision
      value: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
  taskRunTemplate:
    serviceAccountName: test-sa
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: comment-no-branch
  annotations:
    pipelinesascode.tekton.dev/on-comment: "^/test"
spec:
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/opendatahub-io/pipelines.git
    - name: revision
      value: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
  taskRunTemplate:
    serviceAccountName: test-sa
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: safe-cel
  annotations:
    pipelinesascode.tekton.dev/on-cel-expression: event == "push" && target_branch == "main"
spec:
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/opendatahub-io/pipelines.git
    - name: revision
      value: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4e5f6a1b2
  taskRunTemplate:
    serviceAccountName: test-sa
