apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  labels:
    pipelines.appstudio.openshift.io/type: test
  name: sneaky-refs-test
spec:
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/opendatahub-io/pipelines.git
    - name: revision
      value: v1.2.3
  taskRunTemplate:
    serviceAccountName: test-sa
---
apiVersion: tekton.dev/v1
kind: PipelineRun
