  labels:
    pipelines.appstudio.openshift.io/type: test
  name: short-sha-test
spec:
  pipelineRef:
    resolver: git
    params:
    - name: url
      value: https://github.com/opendatahub-io/pipelines.git
    - name: revision
      value: abc123f
  taskRunTemplate:
    serviceAccountName: test-sa
---
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  labels:
    pipelines.appstudio.openshift.io/type: test
  name: refs-heads-main-test
